spring:
  application:
    name: yu-ai-agent
  ai:
    mcp:
      client:
        stdio:
          servers-configuration: classpath:mcp-servers.json
#        sse:
#          connections:
#            image-search-mcp-server:
#              url: http://localhost:8127
    dashscope:
      api-key: your-dashscope-api-key-here
      chat:
        options:
          model: qwen-plus

search-api:
  api-key: your-search-api-key-here

server:
  port: 8123
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.ymh.ymhaiagent.controller

knife4j:
  enable: true
  setting:
    language: zh_cn
